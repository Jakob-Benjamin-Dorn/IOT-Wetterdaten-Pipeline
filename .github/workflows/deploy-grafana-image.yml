name: Deploy Grafana image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker/grafana/**"
      - "grafana/dashboards/**"
      - ".github/workflows/deploy-grafana-image.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push Grafana image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker build \
            -f docker/grafana/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
      - name: Restart Grafana on EC2 via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          set -euo pipefail

          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          INSTANCE_ID="$(
            aws ec2 describe-instances \
              --region "$AWS_REGION" \
              --filters \
                "Name=tag:Project,Values=iot-wetterdaten-pipeline" \
                "Name=tag:Environment,Values=dev" \
                "Name=tag:Name,Values=iot-wetterdaten-pipeline-dev-grafana" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' \
              --output text
          )"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running Grafana EC2 instance found."
            exit 1
          fi

          echo "Restarting Grafana on instance: $INSTANCE_ID"
          echo "Image: $IMAGE_URI"

          cat > /tmp/ssm-params.json <<EOF
          {
            "commands": [
              "set -euxo pipefail",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY",
              "docker pull $IMAGE_URI",
              "/opt/grafana/run-grafana.sh $IMAGE_URI",
              "sleep 10",
              "curl -f http://127.0.0.1:3000/api/health"
            ]
          }
          EOF

          COMMAND_ID="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Restart Grafana after ECR image push" \
              --parameters file:///tmp/ssm-params.json \
              --query "Command.CommandId" \
              --output text
          )"

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
