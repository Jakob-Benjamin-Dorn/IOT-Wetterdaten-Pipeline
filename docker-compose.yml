services:
  postgres:
    image: postgres:16
    container_name: wetter-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  postgres-data:
