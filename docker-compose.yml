services:
  postgres:
    image: postgres:16
    container_name: wetter-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: wetter-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - postgres

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wetter-collector
    ports:
      - "8088:8088"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-central-1

      LOCALSTACK_ENDPOINT: http://localstack:4566
      RAW_BUCKET: weather-raw

      POSTGRES_HOST: wetter-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    depends_on:
      postgres:
        condition: service_started
      localstack:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    container_name: wetter-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: eu-central-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s


volumes:
  postgres-data:
  grafana-data:
  localstack-data:
